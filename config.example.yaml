# 知识星球爬取工具配置文件
# 复制此文件为 config.yaml 并填入真实密钥

# 知识星球专栏配置
zsxq:
  # 专栏 URL（也可通过命令行传入）
  group_url: ""
  # 知识星球网页版地址
  base_url: "https://wx.zsxq.com"

# AI 总结配置
# provider 可选: deepseek | claude
ai:
  provider: "deepseek"

  # DeepSeek API 配置（provider=deepseek 时生效）
  # API Key 也可通过环境变量 DEEPSEEK_API_KEY 设置
  deepseek:
    api_key: ""  # 请在此填入 API Key，或设置环境变量 DEEPSEEK_API_KEY
    model: "deepseek-chat"
    base_url: "https://api.deepseek.com"

  # Claude API 配置（provider=claude 时生效）
  # API Key 也可通过环境变量 ANTHROPIC_API_KEY 设置
  claude:
    api_key: ""
    model: "claude-sonnet-4-6"

# 爬取配置
crawler:
  scroll_delay: 2
  max_posts: 0
  fetch_comments: true

# 存储配置
storage:
  raw_dir: "data/raw"
  summary_dir: "data/summary"

# 股票机会提取配置
stocks:
  scoring:
    upside_weight: 0.30
    quality_weight: 0.20
    consensus_weight: 0.16
    sector_weight: 0.14
    trend_weight: 0.10
    fundamentals_weight: 0.10

    trend:
      min_stocks_for_trend: 2
      max_trend_score: 10
      momentum_weight: 0.35
      size_weight: 0.25
      discussion_weight: 0.25
      logic_weight: 0.15

    sector_aliases:
      "人工智能": "AI/人工智能"
      "AI": "AI/人工智能"
      "大模型": "AI/人工智能"
      "算力": "AI/人工智能"
      "新能源": "新能源"
      "光伏": "新能源"
      "锂电": "新能源"
      "储能": "新能源"
      "半导体": "半导体/芯片"
      "芯片": "半导体/芯片"
      "机器人": "机器人/自动化"
      "汽车": "汽车/新能源车"
      "新能源车": "汽车/新能源车"

# 同花顺账户同步配置（可选）
# 启用后，自动将评分达标的股票同步到同花顺自选分组
ths:
  enabled: false
  cookies_path: "cookies_ths.json"
  score_threshold: 1.5              # >= 此值的股票会同步（实际数据中弹性股约 1.5-1.7）
  group_name_prefix: "知识星球"      # 分组名前缀，实际为「知识星球 MM-DD」
  group_name: "auto"                 # auto=按当日日期建组；或写固定名称
  create_group_if_missing: true
  also_add_to_watchlist: false
  request_delay: 0.3
