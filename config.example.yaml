# 知识星球爬取工具配置文件
# 复制此文件为 config.yaml 并填入真实密钥

# 知识星球专栏配置
zsxq:
  # 专栏 ID（可选；用于 research 命令直接调用搜索接口）
  group_id: ""
  # 专栏 URL（也可通过命令行传入）
  group_url: ""
  # 知识星球网页版地址
  base_url: "https://wx.zsxq.com"

# AI 总结配置
# provider 可选: deepseek | claude
ai:
  provider: "deepseek"

  # OpenAI 兼容接口配置（provider=deepseek 时生效）。
  # 如 base_url 使用小米 Mimo，请优先通过 MIMO_API_KEY 或 XIAOMI_MIMO_API_KEY 设置。
  # 如 base_url 使用 DeepSeek，请优先通过 DEEPSEEK_API_KEY 设置。
  # 本地如需写入配置文件，建议使用 api_key_encrypted，并将解密密钥放在
  # .secrets/{deepseek|mimo}.key 或对应的 *_API_KEY_ENCRYPTION_KEY 环境变量中。
  deepseek:
    api_key: ""
    api_key_encrypted: ""
    model: "mimo-v2.5"
    base_url: "https://api.xiaomimimo.com/v1"

  # Claude API 配置（provider=claude 时生效）
  # API Key 也可通过环境变量 ANTHROPIC_API_KEY 设置
  claude:
    api_key: ""
    model: "claude-sonnet-4-6"

# 爬取配置
crawler:
  scroll_delay: 2
  max_posts: 0  # 0=增量模式默认最多300条；填N=抓最近N条
  fetch_comments: true

# 附件解析配置
# PDF 会直接抽取文本；MP3/M4A/WAV 等音频默认使用小米 MiMo ASR 转写。
# 音频转写优先读取 MIMO_API_KEY / XIAOMI_MIMO_API_KEY；缺少密钥时会跳过音频但不影响日报。
attachments:
  enabled: true
  parse_pdf: true
  transcribe_audio: true
  max_file_mb: 25
  max_pdf_pages: 40
  max_text_chars: 18000
  audio_provider: "mimo"
  audio_base_url: "https://api.xiaomimimo.com/v1"
  audio_model: "mimo-v2.5-asr"
  fallback_audio_provider: "openai"

# 存储配置
storage:
  raw_dir: "data/raw"
  summary_dir: "data/summary"

# 股票机会提取配置
stocks:
  scoring:
    upside_weight: 0.30
    quality_weight: 0.20
    consensus_weight: 0.16
    sector_weight: 0.14
    trend_weight: 0.10
    fundamentals_weight: 0.10

    trend:
      min_stocks_for_trend: 2
      max_trend_score: 10
      momentum_weight: 0.35
      size_weight: 0.25
      discussion_weight: 0.25
      logic_weight: 0.15

    sector_aliases:
      "人工智能": "AI/人工智能"
      "AI": "AI/人工智能"
      "大模型": "AI/人工智能"
      "算力": "AI/人工智能"
      "新能源": "新能源"
      "光伏": "新能源"
      "锂电": "新能源"
      "储能": "新能源"
      "半导体": "半导体/芯片"
      "芯片": "半导体/芯片"
      "机器人": "机器人/自动化"
      "汽车": "汽车/新能源车"
      "新能源车": "汽车/新能源车"

# 同花顺账户同步配置（可选）
# 启用后，自动将评分达标的股票同步到同花顺自选分组
ths:
  enabled: false
  cookies_path: "cookies_ths.json"
  score_threshold: 1.5              # >= 此值的股票会同步（实际数据中弹性股约 1.5-1.7）
  group_name_prefix: "知识星球"      # 分组名前缀，实际为「知识星球 MM-DD」
  group_name: "auto"                 # auto=按当日日期建组；或写固定名称
  create_group_if_missing: true
  also_add_to_watchlist: false
  request_delay: 0.3

# A股主流板块盘中异动 / 盘后复盘配置
sector_monitor:
  board_limit: 500
  stock_limit: 30
  min_change_pct: 0.8       # 板块涨幅达到该阈值才进入候选
  min_main_net_yi: 0.5      # 或主力净流入达到该阈值（亿元）才进入候选
  # market 命令会先评估大盘，再给板块打「加仓/建仓/观察/规避」动作标签
  mainstream_keywords:
    - "人工智能"
    - "AI"
    - "算力"
    - "大模型"
    - "机器人"
    - "半导体"
    - "芯片"
    - "消费电子"
    - "新能源"
    - "储能"
    - "锂电"
    - "光伏"
    - "风电"
    - "电池"
    - "汽车"
    - "新能源车"
    - "军工"
    - "低空经济"
    - "商业航天"
    - "医药"
    - "创新药"
    - "白酒"
    - "食品饮料"
    - "证券"
    - "银行"
    - "有色"
    - "黄金"
    - "稀土"

# GitHub Pages 股票信息聚合看板
dashboard:
  top_n: 10
  board_type: "all"   # all | industry | concept
