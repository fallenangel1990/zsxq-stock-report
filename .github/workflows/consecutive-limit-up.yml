name: A股连板股票扫描

"on":
  workflow_dispatch:
    inputs:
      no_ai:
        description: '不使用AI分类（仅规则分组）'
        type: boolean
        required: false
        default: false
      force:
        description: '强制执行（忽略交易日检查）'
        type: boolean
        required: false
        default: false
  schedule:
    # 目标北京时间约 15:30 收盘后扫描；按历史观察的 Actions 约 4 小时延迟提前配置。
    - cron: '30 7 * * 1-5'

env:
  PYTHONUNBUFFERED: 1

jobs:
  consecutive-limit-up:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: 检出代码
        uses: actions/checkout@v6

      - name: 设置 Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: pip

      - name: 安装 Python 依赖
        run: |
          pip install --upgrade pip -q
          pip install -r requirements.txt -q

      - name: 检查交易日
        if: ${{ !inputs.force }}
        shell: python3 {0}
        run: |
          import datetime
          from zoneinfo import ZoneInfo

          today = datetime.datetime.now(ZoneInfo("Asia/Shanghai")).date()
          try:
              from chinese_calendar import is_workday, is_holiday
              if not is_workday(today) or is_holiday(today):
                  print(f"⏭ 跳过：{today} 非 A 股开盘日（周末或中国法定节假日）")
                  exit(0)
              print(f"✅ {today} 是 A 股开盘日，继续执行...")
          except ImportError:
              if today.weekday() >= 5:
                  print(f"⏭ 跳过：{today} 是周末（北京时间）")
                  exit(0)
              print("⚠️  chinese_calendar 未安装，仅检测北京时间周末，无法排除节假日")

      - name: 写入环境变量
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          MIMO_API_KEY: ${{ secrets.MIMO_API_KEY }}
          XIAOMI_MIMO_API_KEY: ${{ secrets.XIAOMI_MIMO_API_KEY }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_SECURITY: ${{ secrets.SMTP_SECURITY }}
          TO_EMAIL: ${{ secrets.TO_EMAIL }}
        run: |
          python3 - <<'PY'
          import os
          import uuid

          env_file = os.environ["GITHUB_ENV"]
          values = {
              "DEEPSEEK_API_KEY": os.environ.get("DEEPSEEK_API_KEY", ""),
              "MIMO_API_KEY": os.environ.get("MIMO_API_KEY", ""),
              "XIAOMI_MIMO_API_KEY": os.environ.get("XIAOMI_MIMO_API_KEY", ""),
              "SMTP_USER": os.environ.get("SMTP_USER", ""),
              "SMTP_PASS": os.environ.get("SMTP_PASS", ""),
              "SMTP_HOST": os.environ.get("SMTP_HOST", ""),
              "SMTP_PORT": os.environ.get("SMTP_PORT", ""),
              "SMTP_SECURITY": os.environ.get("SMTP_SECURITY", ""),
              "TO_EMAIL": os.environ.get("TO_EMAIL") or "470337944@qq.com",
          }

          with open(env_file, "a", encoding="utf-8") as f:
              for key, value in values.items():
                  if not value:
                      continue
                  marker = f"EOF_{key}_{uuid.uuid4().hex}"
                  f.write(f"{key}<<{marker}\n{value}\n{marker}\n")
          PY

      - name: 写入同花顺 Cookie
        env:
          THS_COOKIES: ${{ secrets.THS_COOKIES }}
        run: |
          if [ -n "$THS_COOKIES" ]; then
            echo "$THS_COOKIES" > cookies_ths.json
            echo "✅ cookies_ths.json 已写入"
          else
            echo "ℹ️  THS_COOKIES secret 未设置，同花顺连板分组将跳过"
          fi

      - name: 创建 config.yaml
        run: |
          if [ ! -f config.yaml ]; then
            cp config.example.yaml config.yaml
            echo "✅ 已从 config.example.yaml 复制"
          fi
          # 启用同花顺同步
          python3 -c "import yaml; p='config.yaml'; cfg=yaml.safe_load(open(p)) or {}; ths=cfg.setdefault('ths', {}); ths.update({'enabled': True, 'cookies_path': 'cookies_ths.json', 'score_threshold': 0, 'group_name_prefix': '连板', 'group_name': 'auto', 'create_group_if_missing': True, 'also_add_to_watchlist': True, 'request_delay': 0.3}); yaml.safe_dump(cfg, open(p, 'w'), allow_unicode=True, sort_keys=False); print('✅ 已配置同花顺连板分组同步')"

      - name: 运行连板扫描
        id: scan
        env:
          NO_AI: ${{ inputs.no_ai }}
        run: |
          AI_FLAG=""
          if [ "$NO_AI" = "true" ]; then
            AI_FLAG="--no-ai"
          fi
          python main.py consec --email $AI_FLAG 2>&1 | tee /tmp/consec.log

          # 提取连板股数量
          python3 - <<'PY' >> "$GITHUB_OUTPUT"
          import re
          text = open("/tmp/consec.log", encoding="utf-8").read()
          m = re.search(r"连板 >= 2 天:\s*(\d+)\s*只", text)
          if m:
              print(f"consecutive_count={m.group(1)}")
          PY

      - name: 发送失败通知邮件
        if: failure()
        shell: python3 {0}
        run: |
          import os, sys
          sys.path.insert(0, '.')
          from email_sender import send_error_email

          try:
              error_msg = open('/tmp/consec.log', 'r', encoding='utf-8').read()[-4000:]
          except Exception:
              error_msg = '连板扫描失败（无日志）'

          send_error_email(
              error_msg=error_msg,
              to_email=os.environ.get('TO_EMAIL', ''),
              step='连板股票扫描',
          )
          print("✅ 错误通知已发送")

      - name: 归档报告
        if: success()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/summary/consecutive/ 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "没有新内容需要提交"
          else
            git commit -m "📈 $(date +%Y-%m-%d) 连板股票扫描"
            git push
            echo "✅ 报告已提交到仓库"
          fi
