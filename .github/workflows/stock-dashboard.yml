name: 股票信息聚合看板

on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: stock-dashboard
  cancel-in-progress: true

jobs:
  build-dashboard:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: 检出代码
        uses: actions/checkout@v6

      - name: 设置 Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: pip

      - name: 安装依赖
        run: |
          pip install --upgrade pip -q
          pip install -r requirements.txt -q

      - name: 创建 config.yaml
        run: |
          cp config.example.yaml config.yaml
          python3 - <<'PY'
          import yaml
          with open("config.yaml", encoding="utf-8") as f:
              cfg = yaml.safe_load(f) or {}
          dashboard = cfg.setdefault("dashboard", {})
          dashboard.setdefault("top_n", 10)
          dashboard.setdefault("board_type", "all")
          # 看板刷新只依赖公开行情，不需要知识星球 Cookie，也不启用同花顺同步。
          ths = cfg.setdefault("ths", {})
          ths["enabled"] = False
          with open("config.yaml", "w", encoding="utf-8") as f:
              yaml.safe_dump(cfg, f, allow_unicode=True, sort_keys=False)
          PY

      - name: 构建静态看板
        run: python3 scripts/build_dashboard.py

      - name: 检查 Pages 启用状态
        env:
          GH_TOKEN: ${{ github.token }}
          PAGES_PAT_CONFIGURED: ${{ secrets.PAGES_PAT != '' }}
        run: |
          status=$(curl -sS -o /tmp/pages.json -w "%{http_code}" \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/pages")
          if [ "$status" = "404" ] && [ "$PAGES_PAT_CONFIGURED" != "true" ]; then
            echo "::error::GitHub Pages 尚未启用。请在仓库 Settings > Pages > Build and deployment > Source 选择 GitHub Actions 后重跑；或添加具备 Pages write/admin 权限的仓库 secret PAGES_PAT，让本 workflow 自动启用 Pages。"
            exit 1
          fi
          if [ "$status" != "200" ] && [ "$status" != "404" ]; then
            cat /tmp/pages.json
            echo "::error::检查 GitHub Pages 配置失败，HTTP ${status}。"
            exit 1
          fi

      - name: 配置/启用 GitHub Pages
        uses: actions/configure-pages@v6
        with:
          token: ${{ secrets.PAGES_PAT || github.token }}
          enablement: ${{ secrets.PAGES_PAT != '' }}

      - name: 上传 Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: site

      - name: 部署到 GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
