name: 每日股票报告

on:
  schedule:
    # 北京时间 8:30（UTC 0:30），周一至周五
    - cron: '30 0 * * 1-5'
  workflow_dispatch:
    inputs:
      max_posts:
        description: '首次运行最大帖子数'
        required: false
        default: '0'
      force:
        description: '强制执行（忽略交易日检查）'
        type: boolean
        required: false
        default: false

env:
  PYTHONUNBUFFERED: 1

jobs:
  daily-report:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # ═══════════════════════════════════════════════════════════
      # 1. 环境准备
      # ═══════════════════════════════════════════════════════════
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: 安装系统依赖（中文字体 + PDF 渲染）
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq fonts-noto-cjk libpango-1.0-0 libpangocairo-1.0-0

      - name: 安装 Python 依赖
        run: |
          pip install --upgrade pip -q
          pip install -r requirements.txt -q

      # ═══════════════════════════════════════════════════════════
      # 2. 配置准备
      # ═══════════════════════════════════════════════════════════
      - name: 创建 config.yaml
        run: |
          if [ ! -f config.yaml ]; then
            cp config.example.yaml config.yaml
            echo "✅ 已从 config.example.yaml 复制"
          else
            echo "✅ config.yaml 已存在"
          fi

      # ═══════════════════════════════════════════════════════════
      # 3. 交易日检查
      # ═══════════════════════════════════════════════════════════
      - name: 检查交易日
        if: ${{ !inputs.force }}
        shell: python3 {0}
        run: |
          import datetime
          try:
              from chinese_calendar import is_workday, is_holiday
              today = datetime.date.today()
              if not is_workday(today) or is_holiday(today):
                  print(f"⏭ 跳过：{today} 非 A 股交易日（周末或中国法定节假日）")
                  exit(0)
              print(f"✅ {today} 是 A 股交易日，继续执行...")
          except ImportError:
              today = datetime.date.today()
              if today.weekday() >= 5:
                  print(f"⏭ 跳过：{today} 是周末")
                  exit(0)
              print(f"⚠️  chinese_calendar 未安装，仅检测周末，无法排除节假日")

      # ═══════════════════════════════════════════════════════════
      # 4. 注入凭证
      # ═══════════════════════════════════════════════════════════
      - name: 写入 cookies.json
        env:
          ZSXQ_COOKIES: ${{ secrets.ZSXQ_COOKIES }}
        run: |
          if [ -n "$ZSXQ_COOKIES" ]; then
            echo "$ZSXQ_COOKIES" > cookies.json
            echo "✅ cookies.json 已写入"
          else
            echo "⚠️  ZSXQ_COOKIES secret 未设置"
          fi

      - name: 检查 Cookie 状态
        id: cookie_check
        shell: python3 {0}
        run: |
          import json, os, sys
          sys.path.insert(0, '.')
          from auth import get_cookie_status
          status = get_cookie_status()
          print(f"Cookie 状态: 有效={status['valid']}, 到期={status['expires_at']}, 剩余{status['days_remaining']}天")

          if not status['valid']:
              print("⚠️  Cookie 已过期")
              with open(os.environ.get('GITHUB_OUTPUT', ''), 'a') as f:
                  f.write("cookie_expired=true\n")
          elif status['warning']:
              print(f"⚠️  Cookie 将在 {status['days_remaining']} 天后过期")
              with open(os.environ.get('GITHUB_OUTPUT', ''), 'a') as f:
                  f.write(f"cookie_warning=true\n")
                  f.write(f"cookie_days={status['days_remaining']}\n")
                  f.write(f"cookie_expires={status['expires_at']}\n")

      - name: 写入环境变量
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          TO_EMAIL: ${{ secrets.TO_EMAIL }}
        run: |
          echo "DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}" >> $GITHUB_ENV
          echo "SMTP_USER=${SMTP_USER}" >> $GITHUB_ENV
          echo "SMTP_PASS=${SMTP_PASS}" >> $GITHUB_ENV
          echo "TO_EMAIL=${TO_EMAIL:-470337944@qq.com}" >> $GITHUB_ENV

      # ═══════════════════════════════════════════════════════════
      # 5. 执行主流程
      # ═══════════════════════════════════════════════════════════
      - name: 运行爬取 + 股票提取
        id: crawl
        env:
          ZSXQ_GROUP_URL: ${{ secrets.ZSXQ_GROUP_URL }}
        run: |
          GROUP_URL="${ZSXQ_GROUP_URL}"
          if [ -z "$GROUP_URL" ]; then
            echo "❌ ZSXQ_GROUP_URL secret 未设置"
            exit 1
          fi
          echo "专栏 URL: $GROUP_URL"

          # 运行并捕获输出
          python main.py all "$GROUP_URL" 2>&1 | tee /tmp/crawl.log || {
            EXIT_CODE=${PIPESTATUS[0]}
            echo "exit_code=$EXIT_CODE" >> $GITHUB_OUTPUT
            # 提取错误信息用于失败通知
            tail -30 /tmp/crawl.log > /tmp/crawl_error.txt
          }

          # 提取帖子数（从日志）
          if grep -q "爬取完成" /tmp/crawl.log; then
            POST_COUNT=$(grep -oP '爬取完成.*?共 \K\d+' /tmp/crawl.log | tail -1 || echo "0")
            echo "total_posts=$POST_COUNT" >> $GITHUB_OUTPUT
          fi

          # 提取发现标的总数（从日志）
          if grep -q "JSON 合并完成" /tmp/crawl.log; then
            Q_COUNT=$(grep -oP '量化 \K\d+' /tmp/crawl.log | tail -1 || echo "0")
            E_COUNT=$(grep -oP '弹性 \K\d+' /tmp/crawl.log | tail -1 || echo "0")
            echo "new_stocks=$((Q_COUNT + E_COUNT))" >> $GITHUB_OUTPUT
          fi

      # ═══════════════════════════════════════════════════════════
      # 6. 生成 PDF
      # ═══════════════════════════════════════════════════════════
      - name: 验证 PDF 后端 + 生成 PDF
        id: pdf
        if: success() || steps.crawl.outcome == 'failure'
        run: |
          # 验证 WeasyPrint 可用性
          python3 -c "
          def check_backend():
              try:
                  from weasyprint import HTML
                  print('[PDF] WeasyPrint 可用 ✅')
                  return 'weasyprint'
              except Exception as e:
                  print(f'[PDF] WeasyPrint 不可用: {e}')
                  try:
                      from playwright.sync_api import sync_playwright
                      print('[PDF] Playwright 可用 ✅（回退）')
                      return 'playwright'
                  except Exception:
                      print('[PDF] ❌ 无可用 PDF 后端')
                      return 'none'
          check_backend()
          "

          # 查找最新报告
          LATEST_STOCKS=$(ls -t data/summary/*stocks*.md 2>/dev/null | head -1)

          if [ -z "$LATEST_STOCKS" ]; then
            echo "⚠️  未找到股票报告文件"
            LATEST_SUMMARY=$(ls -t data/summary/*summary*.md 2>/dev/null | head -1)
            if [ -n "$LATEST_SUMMARY" ]; then
              echo "使用总结报告: $LATEST_SUMMARY"
              python pdf_generator.py "$LATEST_SUMMARY" data/summary/report.pdf
              echo "pdf_path=data/summary/report.pdf" >> $GITHUB_OUTPUT
              echo "md_path=$LATEST_SUMMARY" >> $GITHUB_OUTPUT
            else
              echo "❌ 没有任何报告文件"
              echo "no_report=true" >> $GITHUB_OUTPUT
            fi
          else
            echo "股票报告: $LATEST_STOCKS"
            python pdf_generator.py "$LATEST_STOCKS" data/summary/daily_stock_report.pdf
            echo "pdf_path=data/summary/daily_stock_report.pdf" >> $GITHUB_OUTPUT
            echo "md_path=$LATEST_STOCKS" >> $GITHUB_OUTPUT
          fi

      # ═══════════════════════════════════════════════════════════
      # 7. 发送邮件
      # ═══════════════════════════════════════════════════════════
      - name: 发送成功报告邮件
        if: steps.pdf.outputs.pdf_path != ''
        env:
          TOTAL_POSTS: ${{ steps.crawl.outputs.total_posts }}
          NEW_STOCKS: ${{ steps.crawl.outputs.new_stocks }}
          COOKIE_EXPIRED: ${{ steps.cookie_check.outputs.cookie_expired }}
          COOKIE_WARNING: ${{ steps.cookie_check.outputs.cookie_warning }}
          COOKIE_DAYS: ${{ steps.cookie_check.outputs.cookie_days }}
          COOKIE_EXPIRES: ${{ steps.cookie_check.outputs.cookie_expires }}
        shell: python3 {0}
        run: |
          import os, json, sys
          sys.path.insert(0, '.')
          from email_sender import send_report_notification

          extra = {}
          if os.environ.get('TOTAL_POSTS'):
              extra['total_posts'] = int(os.environ['TOTAL_POSTS'])
          if os.environ.get('NEW_STOCKS'):
              extra['new_stocks'] = int(os.environ['NEW_STOCKS'])
          if os.environ.get('COOKIE_EXPIRED'):
              extra['cookie_expired'] = True
          if os.environ.get('COOKIE_WARNING'):
              extra['cookie_warning'] = True
              extra['cookie_days'] = os.environ.get('COOKIE_DAYS', '')
              extra['cookie_expires'] = os.environ.get('COOKIE_EXPIRES', '')

          pdf = os.environ.get('PDF_PATH', 'data/summary/daily_stock_report.pdf')
          md = os.environ.get('MD_PATH', '')

          send_report_notification(
              pdf_path=pdf,
              to_email=os.environ.get('TO_EMAIL', ''),
              extra_info=extra,
              markdown_path=md,
          )
          print("✅ 邮件已发送")
        env:
          PDF_PATH: ${{ steps.pdf.outputs.pdf_path }}
          MD_PATH: ${{ steps.pdf.outputs.md_path }}

      - name: 发送失败通知邮件
        if: steps.pdf.outputs.no_report == 'true'
        shell: python3 {0}
        run: |
          import sys
          sys.path.insert(0, '.')
          from email_sender import send_error_email

          # 读取爬取错误日志
          try:
              with open('/tmp/crawl_error.txt', 'r') as f:
                  error_msg = f.read()
          except Exception:
              error_msg = '未知错误（无日志）'

          send_error_email(
              error_msg=error_msg,
              to_email=os.environ.get('TO_EMAIL', ''),
              step='爬取/股票提取',
          )
          print("✅ 错误通知已发送")

      # ═══════════════════════════════════════════════════════════
      # 8. 归档报告到仓库
      # ═══════════════════════════════════════════════════════════
      - name: 归档报告
        if: success()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/summary/*.md data/summary/*.pdf data/raw/*.json data/state/*.json 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "没有新内容需要提交"
          else
            git commit -m "📊 $(date +%Y-%m-%d) 自动报告"
            git push
            echo "✅ 报告已提交到仓库"
          fi
