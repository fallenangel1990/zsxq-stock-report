name: 每日股票报告

"on":
  workflow_dispatch:
    inputs:
      max_posts:
        description: '手动触发时最多拉取帖子数（0=不限制）'
        required: false
        default: '0'
      force:
        description: '强制执行（忽略交易日检查）'
        type: boolean
        required: false
        default: false

env:
  PYTHONUNBUFFERED: 1

jobs:
  daily-report:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # ═══════════════════════════════════════════════════════════
      # 1. 环境准备
      # ═══════════════════════════════════════════════════════════
      - name: 检出代码
        uses: actions/checkout@v6

      - name: 设置 Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: pip

      - name: 安装系统依赖（中文字体 + PDF 渲染）
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq fonts-noto-cjk libpango-1.0-0 libpangocairo-1.0-0

      - name: 安装 Python 依赖
        run: |
          pip install --upgrade pip -q
          pip install -r requirements.txt -q

      - name: 安装 Playwright 浏览器
        run: playwright install --with-deps chromium

      # ═══════════════════════════════════════════════════════════
      # 2. 配置准备
      # ═══════════════════════════════════════════════════════════
      - name: 创建 config.yaml
        run: |
          if [ ! -f config.yaml ]; then
            cp config.example.yaml config.yaml
            echo "✅ 已从 config.example.yaml 复制"
          else
            echo "✅ config.yaml 已存在"
          fi
          # 启用同花顺同步（config.yaml 被 gitignore，必须在 CI 中手动启用）
          python3 -c "import yaml; p='config.yaml'; cfg=yaml.safe_load(open(p)) or {}; ths=cfg.setdefault('ths', {}); ths.update({'enabled': True, 'cookies_path': 'cookies_ths.json', 'score_threshold': 1.5, 'group_name_prefix': '知识星球', 'group_name': 'auto', 'create_group_if_missing': True, 'also_add_to_watchlist': True, 'request_delay': 0.3}); yaml.safe_dump(cfg, open(p, 'w'), allow_unicode=True, sort_keys=False); print('✅ 已启用同花顺同步（分组 auto + 默认自选，阈值 1.5）')"

      # ═══════════════════════════════════════════════════════════
      # 3. 交易日检查
      # ═══════════════════════════════════════════════════════════
      - name: 检查交易日
        if: ${{ !inputs.force }}
        shell: python3 {0}
        run: |
          import datetime
          from zoneinfo import ZoneInfo

          today = datetime.datetime.now(ZoneInfo("Asia/Shanghai")).date()
          try:
              from chinese_calendar import is_workday, is_holiday
              if not is_workday(today) or is_holiday(today):
                  print(f"⏭ 跳过：{today} 非 A 股开盘日（周末或中国法定节假日）")
                  exit(0)
              print(f"✅ {today} 是 A 股开盘日，继续执行...")
          except ImportError:
              if today.weekday() >= 5:
                  print(f"⏭ 跳过：{today} 是周末（北京时间）")
                  exit(0)
              print(f"⚠️  chinese_calendar 未安装，仅检测北京时间周末，无法排除节假日")

      # ═══════════════════════════════════════════════════════════
      # 4. 注入凭证
      # ═══════════════════════════════════════════════════════════
      - name: 写入 cookies.json
        env:
          ZSXQ_COOKIES: ${{ secrets.ZSXQ_COOKIES }}
        run: |
          if [ -n "$ZSXQ_COOKIES" ]; then
            echo "$ZSXQ_COOKIES" > cookies.json
            echo "✅ cookies.json 已写入"
          else
            echo "⚠️  ZSXQ_COOKIES secret 未设置"
          fi

      - name: 写入同花顺 cookies（可选）
        env:
          THS_COOKIES: ${{ secrets.THS_COOKIES }}
        run: |
          if [ -n "$THS_COOKIES" ]; then
            echo "$THS_COOKIES" > cookies_ths.json
            echo "✅ cookies_ths.json 已写入"
          else
            echo "ℹ️  THS_COOKIES secret 未设置，同花顺同步将跳过"
          fi

      - name: 检查 Cookie 状态
        id: cookie_check
        shell: python3 {0}
        run: |
          import json, os, sys
          sys.path.insert(0, '.')
          from auth import get_cookie_status
          status = get_cookie_status()
          print(f"Cookie 状态: 有效={status['valid']}, 到期={status['expires_at']}, 剩余{status['days_remaining']}天")

          if not status['valid']:
              print("⚠️  Cookie 已过期")
              with open(os.environ.get('GITHUB_OUTPUT', ''), 'a') as f:
                  f.write("cookie_expired=true\n")
          elif status['warning']:
              print(f"⚠️  Cookie 将在 {status['days_remaining']} 天后过期")
              with open(os.environ.get('GITHUB_OUTPUT', ''), 'a') as f:
                  f.write(f"cookie_warning=true\n")
                  f.write(f"cookie_days={status['days_remaining']}\n")
                  f.write(f"cookie_expires={status['expires_at']}\n")

      - name: 写入环境变量
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_SECURITY: ${{ secrets.SMTP_SECURITY }}
          TO_EMAIL: ${{ secrets.TO_EMAIL }}
        run: |
          python3 - <<'PY'
          import os
          import uuid

          env_file = os.environ["GITHUB_ENV"]
          values = {
              "DEEPSEEK_API_KEY": os.environ.get("DEEPSEEK_API_KEY", ""),
              "SMTP_USER": os.environ.get("SMTP_USER", ""),
              "SMTP_PASS": os.environ.get("SMTP_PASS", ""),
              "SMTP_HOST": os.environ.get("SMTP_HOST", ""),
              "SMTP_PORT": os.environ.get("SMTP_PORT", ""),
              "SMTP_SECURITY": os.environ.get("SMTP_SECURITY", ""),
              "TO_EMAIL": os.environ.get("TO_EMAIL") or "470337944@qq.com",
          }

          with open(env_file, "a", encoding="utf-8") as f:
              for key, value in values.items():
                  if not value:
                      continue
                  marker = f"EOF_{key}_{uuid.uuid4().hex}"
                  f.write(f"{key}<<{marker}\n{value}\n{marker}\n")
          PY

      # ═══════════════════════════════════════════════════════════
      # 5. 执行主流程
      # ═══════════════════════════════════════════════════════════
      - name: 运行爬取 + 股票提取
        id: crawl
        env:
          ZSXQ_GROUP_URL: ${{ secrets.ZSXQ_GROUP_URL }}
          MAX_POSTS: ${{ inputs.max_posts }}
        run: |
          GROUP_URL="${ZSXQ_GROUP_URL}"
          if [ -z "$GROUP_URL" ]; then
            echo "❌ ZSXQ_GROUP_URL secret 未设置"
            exit 1
          fi
          echo "专栏 URL: $GROUP_URL"

          MAX_POSTS_ARG=""
          if [ -n "$MAX_POSTS" ] && [ "$MAX_POSTS" != "0" ]; then
            MAX_POSTS_ARG="--max-posts $MAX_POSTS"
            echo "手动限制帖子数: $MAX_POSTS"
          else
            echo "帖子数限制: 不限制"
          fi

          # 运行并捕获输出
          python main.py all "$GROUP_URL" $MAX_POSTS_ARG 2>&1 | tee /tmp/crawl.log || {
            EXIT_CODE=${PIPESTATUS[0]}
            echo "exit_code=$EXIT_CODE" >> $GITHUB_OUTPUT
            # 提取错误信息用于失败通知
            tail -30 /tmp/crawl.log > /tmp/crawl_error.txt
          }

          # 提取本次处理帖子数：从上次拉取记录之后的全部新增帖子
          python3 - <<'PY' >> "$GITHUB_OUTPUT"
          import re

          text = open("/tmp/crawl.log", encoding="utf-8").read()

          post_counts = re.findall(r"\[3/4\]\s*对.*?\((\d+)\s*篇\)", text)
          if post_counts:
              print(f"total_posts={post_counts[-1]}")

          stock_counts = re.findall(r"JSON 合并完成:\s*量化\s*(\d+)\s*只,\s*弹性\s*(\d+)\s*只", text)
          if stock_counts:
              q_count, e_count = map(int, stock_counts[-1])
              print(f"new_stocks={q_count + e_count}")
          PY

      - name: 确保执行同花顺同步
        if: always()
        run: |
          if [ ! -f cookies_ths.json ]; then
            echo "ℹ️  未找到 cookies_ths.json，跳过同花顺同步"
            exit 0
          fi

          if [ -f /tmp/crawl.log ] && grep -q "同花顺同步结果" /tmp/crawl.log; then
            echo "✅ 主流程已执行同花顺同步"
            exit 0
          fi

          echo "⚠️  主流程未检测到同花顺同步结果，执行兜底同步..."
          python main.py thssync --strict 2>&1 | tee /tmp/thssync.log

      # ═══════════════════════════════════════════════════════════
      # 6. 生成 PDF
      # ═══════════════════════════════════════════════════════════
      - name: 验证 PDF 后端 + 生成 PDF
        id: pdf
        if: success() || steps.crawl.outcome == 'failure'
        run: |
          # 验证 WeasyPrint 可用性
          python3 -c "
          def check_backend():
              try:
                  from weasyprint import HTML
                  print('[PDF] WeasyPrint 可用 ✅')
                  return 'weasyprint'
              except Exception as e:
                  print(f'[PDF] WeasyPrint 不可用: {e}')
                  try:
                      from playwright.sync_api import sync_playwright
                      print('[PDF] Playwright 可用 ✅（回退）')
                      return 'playwright'
                  except Exception:
                      print('[PDF] ❌ 无可用 PDF 后端')
                      return 'none'
          check_backend()
          "

          # 查找最新报告
          LATEST_STOCKS=$(ls -t data/summary/*stocks*.md 2>/dev/null | head -1)

          if [ -z "$LATEST_STOCKS" ]; then
            echo "⚠️  未找到股票报告文件"
            LATEST_SUMMARY=$(ls -t data/summary/*summary*.md 2>/dev/null | head -1)
            if [ -n "$LATEST_SUMMARY" ]; then
              echo "使用总结报告: $LATEST_SUMMARY"
              python pdf_generator.py "$LATEST_SUMMARY" data/summary/report.pdf
              echo "pdf_path=data/summary/report.pdf" >> $GITHUB_OUTPUT
              echo "md_path=$LATEST_SUMMARY" >> $GITHUB_OUTPUT
            else
              echo "❌ 没有任何报告文件"
              echo "no_report=true" >> $GITHUB_OUTPUT
            fi
          else
            echo "股票报告: $LATEST_STOCKS"
            python pdf_generator.py "$LATEST_STOCKS" data/summary/daily_report.pdf
            echo "pdf_path=data/summary/daily_report.pdf" >> $GITHUB_OUTPUT
            echo "md_path=$LATEST_STOCKS" >> $GITHUB_OUTPUT
          fi

      # ═══════════════════════════════════════════════════════════
      # 7. 发送邮件
      # ═══════════════════════════════════════════════════════════
      - name: 发送成功报告邮件
        if: steps.pdf.outputs.md_path != ''
        env:
          TOTAL_POSTS: ${{ steps.crawl.outputs.total_posts }}
          NEW_STOCKS: ${{ steps.crawl.outputs.new_stocks }}
          COOKIE_EXPIRED: ${{ steps.cookie_check.outputs.cookie_expired }}
          COOKIE_WARNING: ${{ steps.cookie_check.outputs.cookie_warning }}
          COOKIE_DAYS: ${{ steps.cookie_check.outputs.cookie_days }}
          COOKIE_EXPIRES: ${{ steps.cookie_check.outputs.cookie_expires }}
          MD_PATH: ${{ steps.pdf.outputs.md_path }}
        shell: python3 {0}
        run: |
          import os, json, sys
          sys.path.insert(0, '.')
          from email_sender import send_report_notification

          extra = {}
          if os.environ.get('TOTAL_POSTS'):
              extra['total_posts'] = int(os.environ['TOTAL_POSTS'])
          if os.environ.get('NEW_STOCKS'):
              extra['new_stocks'] = int(os.environ['NEW_STOCKS'])
          if os.environ.get('COOKIE_EXPIRED'):
              extra['cookie_expired'] = True
          if os.environ.get('COOKIE_WARNING'):
              extra['cookie_warning'] = True
              extra['cookie_days'] = os.environ.get('COOKIE_DAYS', '')
              extra['cookie_expires'] = os.environ.get('COOKIE_EXPIRES', '')

          md = os.environ.get('MD_PATH', '')
          if not md:
              # 回退：查找最新的 stocks markdown
              import glob
              files = sorted(glob.glob('data/summary/*stocks*.md'))
              md = files[-1] if files else ''

          if md:
              send_report_notification(
                  markdown_path=md,
                  to_email=os.environ.get('TO_EMAIL', ''),
                  extra_info=extra,
              )
              print("✅ 邮件已发送")
          else:
              print("❌ 未找到报告 Markdown 文件")

      - name: 发送失败通知邮件
        if: steps.pdf.outputs.no_report == 'true'
        shell: python3 {0}
        run: |
          import sys
          sys.path.insert(0, '.')
          from email_sender import send_error_email

          # 读取爬取错误日志
          try:
              with open('/tmp/crawl_error.txt', 'r') as f:
                  error_msg = f.read()
          except Exception:
              error_msg = '未知错误（无日志）'

          send_error_email(
              error_msg=error_msg,
              to_email=os.environ.get('TO_EMAIL', ''),
              step='爬取/股票提取',
          )
          print("✅ 错误通知已发送")

      # ═══════════════════════════════════════════════════════════
      # 8. 归档报告到仓库
      # ═══════════════════════════════════════════════════════════
      - name: 归档报告
        if: success()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/summary/*.md data/summary/*.pdf data/raw/*.json data/state/*.json 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "没有新内容需要提交"
          else
            git commit -m "📊 $(date +%Y-%m-%d) 自动报告"
            git push
            echo "✅ 报告已提交到仓库"
          fi
